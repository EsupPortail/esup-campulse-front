
stages:
  - .pre
  - prepare
  - build
  - test
  - deploy
  - release

variables:
  __CACHE_KEY: "${CI_PROJECT_DIR}"

dynamic version:
  stage: .pre
  image: debian:testing-slim
  before_script:
    - apt -qy update && DEBIAN_FRONTEND=noninteractive apt -qqy install --no-install-recommends python3-dunamai git
    - git config --global --add safe.directory "*"
  script:
    - echo VERSION=$(./version.sh) | tee .version
  artifacts:
    reports:
      dotenv: .version

prepare:
  stage: prepare
  variables:
    npm_config_cache: $CI_PROJECT_DIR/.npm
  cache:
    key: "$__CACHE_KEY"
    paths:
      - .npm/
  artifacts:
    name: node_modules
    paths:
      - node_modules/
    expire_in: "1 day"
  image:
    name: node:lts
    entrypoint: [""]
  tags:
    - cluster
  needs: []
  script:
    - set -x
    - npm ci --progress=false

type check:
  image:
    name: node:lts
    entrypoint: [""]
  stage: test
  tags:
    - cluster
  variables:
    npm_config_cache: $CI_PROJECT_DIR/.npm
  cache:
    key: "$__CACHE_KEY"
    paths:
      - .npm/
  needs:
    - job: prepare
      artifacts: true
  script:
    - npm run lint
    - npm run typecheck

build:
  stage: build
  cache:
    key: "$__CACHE_KEY"
    paths:
      - .npm/
    when: always
  image:
    name: node:lts
    entrypoint: [""]
  tags:
    - cluster
  needs:
    - job: prepare
      artifacts: true
  variables:
    PATH: $CI_PROJECT_DIR/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    NODE_ENV: production
  script:
    - vue-tsc --noEmit && vite build --mode production
  artifacts:
    name: plan-a-front
    paths:
      - dist/

unit test:
  image: node:lts
  stage: test
  tags:
    - cluster
  needs:
    - job: prepare
      artifacts: true
  variables:
    PATH: $CI_PROJECT_DIR/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  script:
    - vitest --run --environment jsdom
      --coverage --coverage.reportOnFailure
      --coverage.reporter cobertura
      --reporter=junit --outputFile=test-results.xml
  coverage: /All files\s*\|\s*([\d\.]+)/
  artifacts:
    when: always
    reports:
      junit:
        - test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

kaniko:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        EXTRA: latest
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        EXTRA: '${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME/\//-}'
  tags:
    - cluster
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  needs:
    - job: dynamic version
      artifacts: true
    - job: build
      artifacts: true
  script:
    - /kaniko/executor
      --cache=true ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX:+--registry-mirror $CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}
      --context "dir://${CI_PROJECT_DIR}"
      --label org.opencontainers.image.title="$CI_PROJECT_TITLE"
      --label org.opencontainers.image.version="${VERSION}"
      --label org.opencontainers.image.revision="$CI_COMMIT_SHA"
      --label org.opencontainers.image.created="$CI_JOB_STARTED_AT"
      --label org.opencontainers.image.authors="Unistra-DNum-DIP"
      --label org.opencontainers.image.licenses="GPL-3.0-or-later"
      --label org.opencontainers.image.documentation="https://di.pages.unistra.fr/plan_a/plana/frontend"
      --label org.opencontainers.image.source="https://github.com/EsupPortail/esup-campulse-front"
      --destination "${CI_REGISTRY_IMAGE}:${VERSION}"
      ${EXTRA:+--destination ${CI_REGISTRY_IMAGE}:${EXTRA}}

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+(\.\d+)*$/
  script:
    - echo "release job"
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Release $CI_COMMIT_TAG'
    description: './CHANGELOG.md'
